name: Update AI Trending

on:
  # 每 12 小时跑一次：UTC 0:00, 12:00
  schedule:
    - cron: "0 0,12 * * *"
  # 也支持手动触发
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch & filter trending
        env:
          ZHIPU_TRENDING_API_KEY: ${{ secrets.ZHIPU_TRENDING_API_KEY }}
          ZHIPU_MODEL: "glm-4.7"
          ZHIPU_TEMPERATURE: "0.1"
          ZHIPU_MAX_TOKENS: "512"
          FRONTIER_THRESHOLD: "80"
          SIGNAL_THRESHOLD: "80"
          COMPOSITE_THRESHOLD: "60"
          MAX_AGE_DAYS: "5"
          RSS_ITEMS_PER_SOURCE: "5"
          HTTP_TIMEOUT: "15"
          MIN_ITEMS_PER_UPDATE: "8"
          ARXIV_FRONTIER_THRESHOLD: "70"
          ARXIV_UTILITY_THRESHOLD: "70"
          ARXIV_COMPOSITE_THRESHOLD: "65"
          ARXIV_MAX_ITEMS_PER_SOURCE: "100"
          ARXIV_MAX_AFTER_COARSE: "20"
          LLM_REQUEST_INTERVAL: "6"
        run: python scripts/fetch_trending.py

      - name: Commit changes
        run: |
          git config user.name "trending-bot"
          git config user.email "2090006831@qq.com"
          git stash
          git fetch origin main
          git rebase origin/main
          git stash pop || true
          git add public/trending.json
          git diff --cached --quiet || git commit -m "🔄 update trending data"
          git push origin main
