name: Update AI Trending

on:
  # 每 12 小时跑一次：UTC 0:00, 12:00
  schedule:
    - cron: "0 0,12 * * *"
  # 也支持手动触发
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch & filter trending
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_MODEL: "glm-4.7-flash"
          ZHIPU_TEMPERATURE: "0.1"
          ZHIPU_MAX_TOKENS: "512"
          SCORE_THRESHOLD: "5.5"
          SAVE_THRESHOLD: "5.5"
          MAX_AGE_DAYS: "5"
          RSS_ITEMS_PER_SOURCE: "3"
          HTTP_TIMEOUT: "15"
          MIN_ITEMS_PER_UPDATE: "15"
        run: python scripts/fetch_trending.py

      - name: Commit changes
        run: |
          git config user.name "trending-bot"
          git config user.email "bot@flacko.dev"
          git add public/trending.json
          git diff --cached --quiet || git commit -m "🔄 update trending data"
          git push
